name: Bug Report
description: Report a bug or unexpected behavior in Forge
labels: [bug]
title: "[Bug] "
body:
  - type: input
    id: forge-version
    attributes:
      label: Forge Version
      placeholder: "e.g. 0.9.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [macOS, Linux, Windows]
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "e.g. macOS 15.3, Ubuntu 24.04"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [PTY / terminal rendering, Tab management, Command palette, Settings panel, CAST integration, Git status bar, Sidebar, Build / install, Other]
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open Forge
        2. ...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Console Output
      description: Paste any relevant output from the Tauri log, browser devtools, or terminal stderr
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, or anything else that helps reproduce the issue
