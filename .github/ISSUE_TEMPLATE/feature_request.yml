name: Feature Request
description: Suggest a new feature or improvement for Forge
labels: [enhancement]
title: "[Feature] "
body:
  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type
      options: [Terminal behavior, UI / layout, CAST integration, Keyboard shortcuts, Theming, Performance, Accessibility, Other]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? Who benefits and how?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
      description: How do you envision this working? Mockups, sketches, or detailed descriptions are all welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider, and why did you prefer this one?
  - type: dropdown
    id: willing
    attributes:
      label: Willing to Implement?
      options: ["Yes", "No", "Maybe"]
