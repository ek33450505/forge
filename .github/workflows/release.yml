name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  create-release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: forge-dmg
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          prerelease: true
          generate_release_notes: true
          body: |
            ## Forge ${{ github.ref_name }}

            **Note:** This is an ad-hoc signed build. macOS will show a security warning on first launch. Right-click the app and select Open to bypass Gatekeeper.

            ### Installation

            1. Download the `.dmg` file below
            2. Open the DMG and drag Forge to Applications
            3. Right-click Forge.app and select Open (required for ad-hoc builds)
